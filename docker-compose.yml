services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: titan
      POSTGRES_PASSWORD: titan
      POSTGRES_DB: titan
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U titan"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: ["redis-server", "--appendonly", "yes"]
    volumes: ["redisdata:/data"]

  api:
    build: .
    command: uvicorn titan.api.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }

  dashboard:
    build: .
    command: streamlit run titan/dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    env_file: .env
    ports: ["8501:8501"]
    depends_on: [postgres, redis]

  feed:
    build: .
    command: python -m titan.data.feed
    env_file: .env
    depends_on: [postgres, redis]
    restart: unless-stopped

volumes:
  pgdata: {}
  redisdata: {}
